<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8"/>
        <title>Booked: Friends - Activity</title>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
        <script src="https://www.google.com/books/jsapi.js"></script>
        <script defer src="../javascript/header.js"></script>
        <script defer src="../javascript/social.js"></script>
        <link href="../css/styles.css" rel="stylesheet"> 
    </head>
<body>
    <header class="custom-header text-green-900 py-4">

        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center" id="logoAndHome">
                <!-- Logo and Home button will be populated by header.js -->
            </div>
            <div id="userSection" class="flex items-center space-x-4">
                <!-- User Section will be populated by header.js -->
            </div>
        </div>

    </header>

    <!-- Subheader Navigation -->
    <div class="rgb(31, 41, 55) py-4 shadow-md">
        <div class="container mx-auto flex items-center justify-between px-4">

            <!-- Navigation links for subheader -->
            <nav class="flex space-x-6">
                <button id="friendsSection" class="text-gray-300 font-semibold hover:text-gray-100 hover:underline">Friends</button>
                <button id="activitySection" class="text-gray-300 font-semibold hover:text-gray-100 hover:underline">Activity</a>
            </nav>

            <!-- Search bar in subheader -->
            <div class="flex items-center">
                <input type="text" id="searchFriendInput" placeholder="Search for friends by username" class="w-full p-2 rounded-l mb-2">
                <button id="clearSearchButton" class="p-2 bg-red-500 text-white rounded-l mb-2" style="display: none;">&times;</button>
                <button id="searchFriendButton" class="p-2 bg-green-900 text-white rounded-r mb-2">Search</button>
            </div>

        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto mt-8">
        <div class="container flex justify-between px-4">
            <div class="w-full max-w-lg my-8 ml-10">
                <h2 class="text-2xl font-bold text-white text-center mb-4">Friend Activity</h2>
                <div id="activitiesFeed" class="w-full">
                    <!-- Activities feed will be populated here -->
                </div>
            </div>
            <div class="w-full max-w-lg my-8 mr-100">
                <h2 class="text-2xl font-bold text-white text-center mb-4">Currently Reading</h2>
                <div>
                    <!-- Put the Currently Reading Section here once it is made -->
                </div>
            </div>
        </div>
    </main>  
</body>
</html>
